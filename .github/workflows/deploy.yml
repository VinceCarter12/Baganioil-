name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Build 11ty site
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Inject API key into chat.php
        run: |
          python3 - <<'PYEOF'
import os, sys
key = os.environ.get('GROQ_API_KEY', '')
if not key:
    print('Warning: GROQ_API_KEY not set — chat.php will fall back to browser API.')
    sys.exit(0)
path = '_site/chat.php'
with open(path, 'r') as f:
    content = f.read()
if '__GROQ_API_KEY__' not in content:
    print('Placeholder not found in chat.php — already replaced or missing.')
    sys.exit(0)
content = content.replace('__GROQ_API_KEY__', key)
with open(path, 'w') as f:
    f.write(content)
print('chat.php key injected successfully.')
PYEOF
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Push built site to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./_site
          commit_message: "Deploy built site"
